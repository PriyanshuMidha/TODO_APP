services:
  - type: web
    name: focusdock-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # React Router paths like /app/tasks must serve index.html on refresh.
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: focusdock-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
